<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TabTabTab</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn464PC90ZXh0Pjwvc3ZnPg==">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a58ca">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="search-bar">
  <div class="search-bar-row">
    <a id="home-link" href="#/" title="Tilbake til forsiden">⌂ Hjem</a>
    <input type="search" id="search-input" placeholder="Søk artister, sanger, stemning, tekstlinjer…" autocomplete="off" spellcheck="false">
    <button id="search-btn" title="Søk (resultater oppdateres mens du skriver)">Søk</button>
  </div>
  <div id="search-results" hidden>
    <section data-frame="suggest" hidden></section>
    <section data-frame="songs" hidden></section>
    <section data-frame="artists" hidden></section>
    <section data-frame="lyrics" hidden></section>
    <section data-frame="empty" hidden></section>
  </div>
</header>
<div id="app"></div>
<a id="enrich-pill" href="#/import/ug" hidden></a>
<!-- JSON5 (vendored, ~31 KB UMD → global JSON5) — lenient parser used by
     enrich-ondevice.js to absorb the long tail of LLM-output quirks. -->
<script src="vendor/json5.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
